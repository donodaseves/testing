<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dase AI Lab</title>
<style>
  :root {
    --bg: #1A1B1D; --surface: #212226; --surface-alt: #26272C; --border: #34363B;
    --border-soft: #2B2C31; --text: #E8E9EB; --text-muted: #9A9CA3; --text-faint: #6B6D74;
    --focus: #6C6E74; --primary: #4C7EF0; --danger: #C94A3B; --shadow: 0 8px 24px rgba(0,0,0,0.45);
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 60px; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 0; }
  
  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 22px; border-bottom: 1px solid var(--border-soft); margin-bottom: 28px; }
  .icon-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; padding: 8px 12px; font-family: monospace; font-size: 12px; cursor: pointer; }
  .more-dropdown { display: block; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); width: 170px; margin-top: 5px; }
  .more-item { padding: 9px 12px; font-family: monospace; font-size: 12px; color: var(--text-muted); border: none; background: none; width: 100%; text-align: left; }

  /* Grids */
  .ai-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .ai-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--focus); border-radius: 5px; padding: 16px; position: relative; }
  .secondary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 16px; margin-bottom: 16px; }
  
  /* UI Elements */
  textarea, input { width: 100%; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px; }
  .btn { background: var(--surface-alt); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12.5px; }
  .btn.primary { background: var(--primary); color: #fff; }
  .chip { background: var(--surface-alt); border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; display: inline-block; margin: 4px; font-family: monospace; font-size: 11px; }
  
  /* Overlays */
  .cmdk-overlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; padding-top: 100px; z-index: 100; }
  .cmdk-box { width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Dase AI Lab</h1>
    <div class="header-controls">
      <button class="icon-btn">♥ Donate</button>
      <button class="icon-btn">⌘K Search</button>
      <div class="more-dropdown">
        <button class="more-item">◧ Focus Mode</button>
        <button class="more-item">☾ Theme</button>
        <button class="more-item">? Shortcuts</button>
        <button class="more-item" style="color:var(--danger)">⟲ Reset data</button>
      </div>
    </div>
  </header>

  <section class="deck">
    <div class="ai-grid">
      <!-- Cards de IA -->
      <div class="ai-card" style="--focus:#10A37F"><span class="name">ChatGPT</span></div>
      <div class="ai-card" style="--focus:#D97757"><span class="name">Claude</span></div>
    </div>
  </section>

  <div class="card">
    <h2>Draft</h2>
    <textarea style="min-height: 140px;"></textarea>
    <div class="row" style="display:flex; gap:10px; margin-top:10px;">
      <button class="btn primary">Copy</button>
      <select class="btn"><option>My Prompts ▾</option></select>
      <button class="btn">+</button>
    </div>
  </div>

  <section class="secondary-grid">
    <div class="card"><h2>Timer</h2><div style="font-size:30px; text-align:center">25:00</div></div>
    <div class="card"><h2>Notes</h2><textarea></textarea></div>
    <div class="card"><h2>Redirects</h2><div class="chip">Excalidraw</div><div class="chip">+</div></div>
  </section>
</div>

<!-- Exemplo de Modal (exibiria conforme necessário) -->
<div class="cmdk-overlay">
  <div class="cmdk-box">
    <input type="text" placeholder="Search...">
    <div style="padding:10px; color:var(--text-muted)">Resultados...</div>
  </div>
</div>

</body>
</html>
