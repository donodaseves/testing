<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dase AI Lab</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<style>
  :root {
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --serif: Georgia, "Iowan Old Style", "Times New Roman", serif;
    --radius: 5px;
    --dur: 160ms;
  }

  html[data-theme="dark"] {
    --bg: #1A1B1D;
    --surface: #212226;
    --surface-alt: #26272C;
    --border: #34363B;
    --border-soft: #2B2C31;
    --text: #E8E9EB;
    --text-muted: #9A9CA3;
    --text-faint: #6B6D74;
    --focus: #6C6E74;
    --primary: #4C7EF0;
    --danger: #C94A3B;
    --shadow: 0 8px 24px rgba(0,0,0,0.45);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  a { color: inherit; text-decoration: none; }

  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 0; }

  /* Header */
  header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding-bottom: 22px; border-bottom: 1px solid var(--border-soft); margin-bottom: 28px; }
  .brand h1 { margin: 0; font-family: var(--serif); font-size: 23px; font-weight: 700; letter-spacing: -0.01em; }
  .header-controls { display: flex; align-items: center; gap: 8px; }
  .icon-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; padding: 8px 12px; font-family: var(--mono); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }

  /* AI Grid */
  section.deck { margin-bottom: 32px; }
  .ai-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .ai-card { position: relative; background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--focus); border-radius: var(--radius); padding: 16px 16px 14px; display: flex; flex-direction: column; gap: 4px; }
  .ai-card .name { font-size: 15px; font-weight: 600; }
  .ai-card .desc { font-size: 12px; color: var(--text-muted); }
  .ai-card .keycap { position: absolute; top: 10px; right: 10px; font-family: var(--mono); font-size: 10px; color: var(--text-faint); border: 1px solid var(--border); border-radius: 4px; padding: 2px 5px; background: var(--surface-alt); }

  /* Secondary Grid */
  .secondary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .col-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 16px; }
  .panel-col { display: flex; flex-direction: column; gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .card h2 { margin: 0 0 10px; font-size: 12px; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); display: flex; justify-content: space-between; }
  
  textarea { width: 100%; min-height: 140px; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; }
  .btn { background: var(--surface-alt); border: 1px solid var(--border); color: var(--text); font-size: 12.5px; padding: 7px 14px; border-radius: 6px; cursor: pointer; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .draft-meta { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-top: 6px; }
  
  footer { max-width: 980px; margin: 30px auto 0; padding: 0 20px; font-family: var(--mono); font-size: 11px; color: var(--text-faint); text-align: center; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand"><h1>Dase AI Lab</h1></div>
    <div class="header-controls">
      <button class="icon-btn">♥ Donate</button>
      <button class="icon-btn">⌘K Search</button>
      <button class="icon-btn">⋯ More</button>
    </div>
  </header>

  <section class="deck">
    <div class="ai-grid">
      <div class="ai-card">
        <span class="keycap">Alt+1</span>
        <span class="name">ChatGPT</span>
        <span class="desc">General purpose</span>
      </div>
    </div>
  </section>

  <div class="card">
    <h2>Draft</h2>
    <textarea placeholder="Write or paste a prompt here..."></textarea>
    <div class="draft-meta">0 words · 0 characters</div>
    <div class="row">
      <button class="btn">Copy</button>
      <button class="btn">Save .txt</button>
      <button class="btn">Clear</button>
    </div>
  </div>

  <section class="secondary-grid">
    <div class="panel-col">
      <div class="col-label">Time</div>
      <div class="card">
        <h2>Timer</h2>
        <div style="font-family: var(--mono); font-size: 36px; text-align: center; margin: 10px 0;">25:00</div>
        <div class="row" style="justify-content: center;">
          <button class="btn">Start</button>
          <button class="btn">Reset</button>
        </div>
      </div>
    </div>

    <div class="panel-col">
      <div class="col-label">Scratch</div>
      <div class="card">
        <h2>Notes</h2>
        <textarea style="min-height: 90px;"></textarea>
      </div>
    </div>

    <div class="panel-col">
      <div class="col-label">Lookup</div>
      <div class="card">
        <h2>Wikipedia</h2>
        <div class="row">
          <input type="text" style="flex:1; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 6px; padding: 7px;">
          <button class="btn">🔍</button>
        </div>
      </div>
    </div>
  </section>
</div>

<footer>Personal project.</footer>

</body>
</html>
