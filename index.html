<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dase AI Lab</title>
<style>
  :root {
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --serif: Georgia, "Iowan Old Style", "Times New Roman", serif;
    --radius: 5px;
    --dur: 160ms;
    --bg: #1A1B1D;
    --surface: #212226;
    --surface-alt: #26272C;
    --border: #34363B;
    --border-soft: #2B2C31;
    --text: #E8E9EB;
    --text-muted: #9A9CA3;
    --text-faint: #6B6D74;
    --focus: #6C6E74;
    --primary: #4C7EF0;
    --danger: #C94A3B;
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); margin: 0; padding-bottom: 60px; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 0; }
  header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 22px; border-bottom: 1px solid var(--border-soft); margin-bottom: 28px; }
  .brand h1 { margin: 0; font-family: var(--serif); font-size: 23px; }
  .header-controls { display: flex; gap: 8px; }
  .icon-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; padding: 8px 12px; font-family: var(--mono); font-size: 12px; cursor: pointer; }
  .ai-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .ai-card { position: relative; background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--focus); border-radius: var(--radius); padding: 16px; cursor: pointer; }
  .ai-card .name { font-size: 15px; font-weight: 600; display: block; }
  .ai-card .desc { font-size: 12px; color: var(--text-muted); }
  .ai-card .keycap { position: absolute; top: 10px; right: 10px; font-family: var(--mono); font-size: 10px; color: var(--text-faint); border: 1px solid var(--border); border-radius: 4px; padding: 2px 5px; background: var(--surface-alt); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .card h2 { margin: 0 0 10px; font-size: 12px; font-family: var(--mono); color: var(--text-muted); display: flex; justify-content: space-between; }
  textarea { width: 100%; min-height: 140px; background: var(--surface-alt); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; font-family: var(--sans); }
  .secondary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .col-label { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-bottom: 16px; text-transform: uppercase; }
  .btn { background: var(--surface-alt); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12.5px; }
  .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btn.danger-outline { color: var(--danger); border-color: var(--danger); }
  .row { display: flex; gap: 8px; margin-top: 10px; }
  .timer-card { text-align: center; }
  .pomodoro-time { font-family: var(--mono); font-size: 36px; font-weight: 600; margin: 10px 0; }
  footer { max-width: 980px; margin: 30px auto 0; padding: 0 20px; font-family: var(--mono); font-size: 11px; color: var(--text-faint); text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><h1>Dase AI Lab</h1></div>
    <div class="header-controls">
      <button class="icon-btn">♥ Donate</button>
      <button class="icon-btn">⌘K Search</button>
      <button class="icon-btn">⋯ More</button>
    </div>
  </header>

  <section class="deck">
    <div class="ai-grid">
      <div class="ai-card" style="--focus: #10A37F;"><span class="keycap">Alt+1</span><span class="name">ChatGPT</span><span class="desc">General purpose</span></div>
      <div class="ai-card" style="--focus: #D97757;"><span class="keycap">Alt+2</span><span class="name">Claude</span><span class="desc">Writing & code</span></div>
      <div class="ai-card" style="--focus: #4E8CFF;"><span class="keycap">Alt+3</span><span class="name">Gemini</span><span class="desc">Multimodal</span></div>
      <div class="ai-card" style="--focus: #FF7000;"><span class="keycap">Alt+4</span><span class="name">Mistral</span><span class="desc">Open-weight</span></div>
      <div class="ai-card" style="--focus: #20B8CD;"><span class="keycap">Alt+5</span><span class="name">Perplexity</span><span class="desc">Web research</span></div>
      <div class="ai-card" style="--focus: #9AA0A6;"><span class="keycap">Alt+6</span><span class="name">Grok</span><span class="desc">Real-time data</span></div>
      <div class="ai-card" style="--focus: #4D6BFE;"><span class="keycap">Alt+7</span><span class="name">DeepSeek</span><span class="desc">Reasoning</span></div>
      <div class="ai-card" style="--focus: #DE5833;"><span class="keycap">Alt+8</span><span class="name">DuckDuckGo</span><span class="desc">Privacy</span></div>
    </div>
  </section>

  <div class="card">
    <h2>Draft</h2>
    <textarea></textarea>
    <div class="row">
      <button class="btn primary">Copy</button>
      <button class="btn">Save .txt</button>
      <button class="btn danger-outline">Clear</button>
    </div>
  </div>

  <section class="secondary-grid">
    <div class="panel-col">
      <div class="col-label">Time</div>
      <div class="card timer-card">
        <h2>Timer</h2>
        <div class="pomodoro-time">25:00</div>
        <div class="row" style="justify-content:center"><button class="btn primary">Start</button><button class="btn danger-outline">Reset</button></div>
      </div>
    </div>
    <div class="panel-col">
      <div class="col-label">Scratch</div>
      <div class="card">
        <h2>Notes</h2>
        <textarea style="min-height: 90px;"></textarea>
      </div>
    </div>
    <div class="panel-col">
      <div class="col-label">Lookup</div>
      <div class="card">
        <h2>Wikipedia</h2>
        <input type="text" style="width:100%; background:var(--surface-alt); border:1px solid var(--border); border-radius:6px; padding:8px; color:var(--text);">
      </div>
    </div>
  </section>
</div>
<footer>Personal project.</footer>
</body>
</html>
